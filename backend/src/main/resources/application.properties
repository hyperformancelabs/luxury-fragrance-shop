spring.application.name=backend
server.port=8080

# Connect to MSSQL
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=EnterpriseLFSDB;encrypt=true;trustServerCertificate=true;characterEncoding=UTF-8
spring.datasource.username=admin
spring.datasource.password=Luxury@Fragrance
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate config
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway config
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.database=mssql