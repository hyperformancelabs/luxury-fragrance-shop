<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu đơn hàng - APH Perfume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4 text-center">Tra cứu đơn hàng</h2>

            <!-- Gửi form đến endpoint xử lý riêng -->
            <form method="get" action="/track-order/search">
                <div class="mb-3">
                    <label for="phone" class="form-label">Số điện thoại</label>
                    <input type="tel" class="form-control" id="phone" name="phone" required placeholder="VD: 0987654321">
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-dark">Tra cứu</button>
                </div>
            </form>

            <div th:if="${error}" class="alert alert-danger mt-4" th:text="${error}"></div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
