<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật mật khẩu - APH Perfume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="/">APH Perfume</a>
    </div>
</nav>

<main class="container py-5">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Cập nhật mật khẩu</h1>
                <p class="auth-subtitle">Tài khoản của bạn được tạo tự động, vui lòng cập nhật mật khẩu để tiếp tục.</p>
            </div>

            <div th:if="${info}" class="alert alert-info" th:text="${info}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form action="/auth/update-password" method="post">
                <input type="hidden" name="phoneOrEmail" th:value="${phoneOrEmail}"/>

                <div class="form-group mb-3">
                    <label for="newPassword" class="form-label">Mật khẩu mới</label>
                    <input type="password" id="newPassword" name="newPassword" class="form-control" required>
                </div>

                <div class="form-group mb-4">
                    <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
                </div>

                <button type="submit" class="auth-btn w-100">Cập nhật mật khẩu</button>
            </form>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="bg-dark text-white py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2025 APH Perfume. Tất cả các quyền được bảo lưu.</p>
    </div>
</footer>

<script>
    // Optional: check confirm password before submit
    document.querySelector('form').addEventListener('submit', function (e) {
        const pw = document.getElementById('newPassword').value;
        const cpw = document.getElementById('confirmPassword').value;
        if (pw !== cpw) {
            e.preventDefault();
            alert("Mật khẩu xác nhận không khớp.");
        }
    });
</script>
</body>
</html>
