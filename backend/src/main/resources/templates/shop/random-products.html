<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover New Fragrances - Perfume Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card {
            transition: transform 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .product-img {
            height: 200px;
            object-fit: contain;
        }
        .discover-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #6610f2;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <!-- Header -->
        <header class="mb-4">
            <h1 class="text-center">Discover New Fragrances</h1>
            <p class="text-center text-muted">Explore our random selection of perfumes to find your new favorite</p>
        </header>
        
        <!-- Refresh Button -->
        <div class="text-center mb-4">
            <a th:href="@{/shop/random}" class="btn btn-outline-primary">
                <i class="fas fa-random me-2"></i>Refresh Selection
            </a>
        </div>
        
        <!-- Products Grid -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-5 g-4 mb-4">
            <div class="col" th:each="product : ${products}">
                <div class="card product-card h-100">
                    <div class="position-relative">
                        <img th:src="${product.imageUrl}" class="card-img-top product-img" alt="Product Image">
                        <span class="discover-badge">Discover</span>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title" th:text="${product.productName}"></h5>
                        <p class="card-text">
                            <span class="badge bg-secondary" th:text="${product.brandName}"></span>
                        </p>
                        <p class="card-text">
                            <span class="fw-bold" th:text="${'$' + #numbers.formatDecimal(product.price, 0, 'COMMA', 2, 'POINT')}"></span>
                        </p>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{'/shop/product/' + ${product.productId}}" class="btn btn-sm btn-outline-primary">View Details</a>
                            <button class="btn btn-sm btn-primary">
                                <i class="fas fa-shopping-cart"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Empty State -->
        <div class="text-center py-5" th:if="${#lists.isEmpty(products)}">
            <i class="fas fa-flask fa-3x text-muted mb-3"></i>
            <h3>No products available</h3>
            <p class="text-muted">We couldn't find any products to display.</p>
            <a th:href="@{/shop}" class="btn btn-primary mt-2">Browse All Products</a>
        </div>
        
        <!-- Back to Shop -->
        <div class="text-center mt-4">
            <a th:href="@{/shop}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back to Shop
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
