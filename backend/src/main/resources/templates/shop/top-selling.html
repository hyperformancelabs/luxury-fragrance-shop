<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Selling Products - Perfume Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card {
            transition: transform 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .product-img {
            height: 200px;
            object-fit: contain;
        }
        .rank-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #dc3545;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <!-- Header -->
        <header class="mb-4">
            <h1 class="text-center">Top Selling Products</h1>
            <p class="text-center text-muted" th:if="${category != null}">
                Category: <span th:text="${category}"></span>
            </p>
            <p class="text-center text-muted" th:unless="${category != null}">
                Our most popular perfumes across all categories
            </p>
        </header>
        
        <!-- Category Filter -->
        <div class="row mb-4">
            <div class="col-md-6 mx-auto">
                <div class="d-flex justify-content-center">
                    <a th:href="@{/shop/top-selling}" class="btn btn-outline-primary me-2"
                       th:classappend="${category == null ? 'active' : ''}">All Categories</a>
                    <a th:href="@{/shop/top-selling(category='men')}" class="btn btn-outline-primary me-2"
                       th:classappend="${category == 'men' ? 'active' : ''}">Men</a>
                    <a th:href="@{/shop/top-selling(category='women')}" class="btn btn-outline-primary me-2"
                       th:classappend="${category == 'women' ? 'active' : ''}">Women</a>
                    <a th:href="@{/shop/top-selling(category='unisex')}" class="btn btn-outline-primary"
                       th:classappend="${category == 'unisex' ? 'active' : ''}">Unisex</a>
                </div>
            </div>
        </div>
        
        <!-- Products Grid -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4 mb-4">
            <div class="col" th:each="product, stat : ${products}">
                <div class="card product-card h-100">
                    <div class="position-relative">
                        <img th:src="${product.imageUrl}" class="card-img-top product-img" alt="Product Image">
                        <span class="rank-badge" th:text="${stat.index + 1}">1</span>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title" th:text="${product.productName}"></h5>
                        <p class="card-text">
                            <span class="badge bg-secondary" th:text="${product.brandName}"></span>
                        </p>
                        <p class="card-text">
                            <span class="fw-bold" th:text="${'$' + #numbers.formatDecimal(product.price, 0, 'COMMA', 2, 'POINT')}"></span>
                        </p>
                        <p class="card-text">
                            <span class="text-success" th:text="${product.soldQuantity + ' sold'}"></span>
                        </p>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{'/shop/product/' + ${product.productId}}" class="btn btn-sm btn-outline-primary">View Details</a>
                            <button class="btn btn-sm btn-primary">
                                <i class="fas fa-shopping-cart"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Empty State -->
        <div class="text-center py-5" th:if="${#lists.isEmpty(products)}">
            <i class="fas fa-chart-line fa-3x text-muted mb-3"></i>
            <h3>No top selling products found</h3>
            <p class="text-muted">We don't have enough data for this category yet.</p>
            <a th:href="@{/shop}" class="btn btn-primary mt-2">Browse All Products</a>
        </div>
        
        <!-- Back to Shop -->
        <div class="text-center mt-4">
            <a th:href="@{/shop}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back to Shop
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
