<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout/layout :: html(
        title='Quản lý nhân viên - Shop Nước Hoa Xa Xỉ',
        activeMenu='employees',
        content=~{::content},
        additionalCss=~{::additionalCss},
        additionalJs=~{::additionalJs}
      )}">
<head>
    <additionalCss>
        <style>
            .status-badge {
                padding: 0.25rem 0.5rem;
                border-radius: 0.25rem;
                font-size: 0.75rem;
                font-weight: 600;
            }
            .status-active {
                background-color: #e8f5e9;
                color: #2e7d32;
            }
            .status-inactive {
                background-color: #f5f5f5;
                color: #616161;
            }
            .status-on-leave {
                background-color: #fff8e1;
                color: #f57f17;
            }
            .employee-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background-color: #f5f5f5;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1rem;
                color: #6c757d;
            }
            .role-badge {
                font-size: 0.7rem;
                padding: 0.15rem 0.4rem;
                border-radius: 0.25rem;
                background-color: #e3f2fd;
                color: #1565c0;
                margin-right: 0.25rem;
                margin-bottom: 0.25rem;
                display: inline-block;
            }
        </style>
    </additionalCss>
</head>
<body>
<content>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Quản lý nhân viên</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
            <i class="fas fa-plus me-1"></i> Thêm nhân viên mới
        </button>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/admin/employees}" method="get">
                <div class="row g-3 align-items-center">
                    <div class="col-md-4">
                        <input type="text" class="form-control" name="keyword"
                               th:attr="value=${keyword != null ? keyword : null}"
                               placeholder="Tìm kiếm nhân viên...">
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" name="status">
                            <option value="" th:selected="${status == null}">Tất cả trạng thái</option>
                            <option value="active" th:selected="${status == 'active'}">Đang làm việc</option>
                            <option value="inactive" th:selected="${status == 'inactive'}">Không hoạt động</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" name="roleName">
                            <option value="" th:selected="${roleName == null}">Tất cả vai trò</option>
                            <option value="Material Staff" th:selected="${roleName == 'Material Staff'}">Nhân viên quản lý sản phẩm</option>
                            <option value="Order Staff" th:selected="${roleName == 'Order Staff'}">Nhân viên xử lý đơn hàng</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" name="sortField">
                            <option value="" th:selected="${sortField == null}">Sắp xếp</option>
                            <option value="full_name" th:selected="${sortField == 'full_name'}">Tên</option>
                            <option value="start_date" th:selected="${sortField == 'start_date'}">Ngày bắt đầu</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" name="sortDir">
                            <option value="asc" th:selected="${sortDir == 'asc'}">Tăng dần</option>
                            <option value="desc" th:selected="${sortDir == 'desc'}">Giảm dần</option>
                        </select>
                    </div>
                </div>
                <div class="mt-3 text-end">
                    <button type="submit" class="btn btn-outline-primary">
                        <i class="fas fa-filter me-1"></i> Lọc
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th style="width: 50px;">#</th>
                        <th>Nhân viên</th>
                        <th>Tên đăng nhập</th>
                        <th>Số điện thoại</th>
                        <th>Email</th>
                        <th>Vai trò</th>
                        <th>Trạng thái</th>
                        <th style="width: 100px;">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="employee, stat : ${employees}">
                        <td th:text="${stat.count + currentPage * 10}">1</td>
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="employee-avatar me-3">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div>
                                    <h6 class="mb-0" th:text="${employee.fullName}">Admin User</h6>
                                </div>
                            </div>
                        </td>
                        <td th:text="${employee.username}">admin</td>
                        <td th:text="${employee.phoneNumber}">0912345678</td>
                        <td th:text="${employee.email}">admin@shop.com</td>
                        <td>
                            <span th:each="role : ${employee.role}" th:text="${role}" class="role-badge">ADMIN</span>
                        </td>
                        <td>
                            <span th:class="${
                                employee.status == 'active' ? 'status-badge status-active' :
                                employee.status == 'inactive' ? 'status-badge status-inactive' :
                                employee.status == 'on_leave' ? 'status-badge status-on-leave' :
                                'status-badge'
                            }" th:text="${
                                employee.status == 'active' ? 'Đang làm việc' :
                                employee.status == 'inactive' ? 'Không hoạt động' :
                                employee.status
                            }">Đang làm việc</span>
                        </td>
                        <td>
                            <div class="btn-group">
                                <a th:href="@{/admin/employees/{id}(id=${employee.employeeId})}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <form th:action="@{/admin/employees/delete}" method="post"
                                      class="delete-form">
                                    <input type="hidden" name="id" th:value="${employee.employeeId}"/>
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(employees)}">
                        <td colspan="8" class="text-center py-4">
                            <p class="mb-0 text-muted">Không tìm thấy nhân viên nào</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
            <div>
                <span>Hiển thị <span th:text="${#lists.size(employees)}">10</span> / <span th:text="${totalPages * 10}">100</span> nhân viên</span>
            </div>
            <nav th:if="${totalPages > 1}">
                <ul class="pagination mb-0">
                    <li th:class="${currentPage == 0 ? 'page-item disabled' : 'page-item'}">
                        <a class="page-link" th:href="@{/admin/employees(page=${currentPage - 1}, keyword=${keyword}, status=${status}, roleName=${roleName}, sortField=${sortField}, sortDir=${sortDir})}" aria-label="Previous">
                            <span aria-hidden="true">&laquo;</span>
                        </a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:class="${currentPage == i ? 'page-item active' : 'page-item'}">
                        <a class="page-link" th:href="@{/admin/employees(page=${i}, keyword=${keyword}, status=${status}, roleName=${roleName}, sortField=${sortField}, sortDir=${sortDir})}" th:text="${i + 1}">1</a>
                    </li>
                    <li th:class="${currentPage == totalPages - 1 ? 'page-item disabled' : 'page-item'}">
                        <a class="page-link" th:href="@{/admin/employees(page=${currentPage + 1}, keyword=${keyword}, status=${status}, roleName=${roleName}, sortField=${sortField}, sortDir=${sortDir})}" aria-label="Next">
                            <span aria-hidden="true">&raquo;</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- Form ẩn để submit lọc -->
    <form id="filterForm" th:action="@{/admin/employees}" method="get">
        <input type="hidden" name="keyword" th:value="${keyword}">
        <input type="hidden" name="status" id="statusInput" th:value="${status}">
        <input type="hidden" name="roleName" id="roleNameInput" th:value="${roleName}">
        <input type="hidden" name="sortField" id="sortFieldInput" th:value="${sortField}">
        <input type="hidden" name="sortDir" id="sortDirInput" th:value="${sortDir}">
    </form>

    <!-- Modal Thêm nhân viên -->
    <div class="modal fade" id="addEmployeeModal" tabindex="-1" aria-labelledby="addEmployeeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <form th:action="@{/admin/employees/add}" method="post" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addEmployeeModalLabel">Thêm nhân viên mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                </div>
                <div class="modal-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" name="fullName" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" name="phoneNumber" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Địa chỉ</label>
                        <input type="text" name="address" class="form-control">
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Ngày sinh</label>
                            <input type="date" name="dateOfBirth" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Ngày bắt đầu làm việc</label>
                            <input type="date" name="startDate" class="form-control">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Trạng thái</label>
                            <select name="status" class="form-select" required>
                                <option value="active">Đang làm việc</option>
                                <option value="inactive">Không hoạt động</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Vai trò</label>
                            <select name="role" class="form-select" required>
                                <option value="Material Staff">Nhân viên quản lý sản phẩm</option>
                                <option value="Order Staff">Nhân viên xử lý đơn hàng</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Huỷ</button>
                    <button type="submit" class="btn btn-primary">Lưu nhân viên</button>
                </div>
            </form>
        </div>
    </div>

</content>
<additionalJs>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function applyFilter(field, value) {
            document.getElementById(field + 'Input').value = value;
            document.getElementById('filterForm').submit();
        }
        function applyFilterSort(field, direction) {
            document.getElementById('sortFieldInput').value = field;
            document.getElementById('sortDirInput').value = direction;
            document.getElementById('filterForm').submit();
        }
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const deleteForms = document.querySelectorAll('.delete-form');

            deleteForms.forEach(form => {
                form.addEventListener('submit', function (e) {
                    e.preventDefault(); // Ngăn form gửi ngay

                    Swal.fire({
                        title: 'Bạn có chắc muốn xóa?',
                        text: "Hành động này không thể hoàn tác!",
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#d33',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'Xóa',
                        cancelButtonText: 'Hủy'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            form.submit(); // Gửi form nếu xác nhận
                        }
                    });
                });
            });
        });
    </script>
    <!-- Thông báo SweetAlert2 -->
    <script th:inline="javascript">
        /*<![CDATA[*/
            let successMessage = /*[[${success}]]*/ null;
            let errorMessage = /*[[${error}]]*/ null;

            if (successMessage) {
                Swal.fire({
                    icon: 'success',
                    title: 'Thành công!',
                    text: successMessage,
                    confirmButtonColor: '#3085d6',
                    confirmButtonText: 'Đóng'
                });
            }

            if (errorMessage) {
                Swal.fire({
                    icon: 'error',
                    title: 'Thất bại!',
                    text: errorMessage,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'Đóng'
                });
            }
        /*]]>*/
    </script>
</additionalJs>
</body>
</html>
