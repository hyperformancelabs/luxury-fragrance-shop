<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout/layout :: html(
        title='Quản lý khách hàng - Shop Nước Hoa Xa Xỉ',
        activeMenu='customers',
        content=~{::content},
        additionalCss=~{::additionalCss},
        additionalJs=~{::additionalJs}
      )}">
<head>
    <additionalCss>
        <style>
            .status-badge {
                padding: 0.25rem 0.5rem;
                border-radius: 0.25rem;
                font-size: 0.75rem;
                font-weight: 600;
            }

            .status-active {
                background-color: #e8f5e9;
                color: #2e7d32;
            }

            .status-inactive {
                background-color: #f5f5f5;
                color: #616161;
            }

            .status-banned {
                background-color: #ffebee;
                color: #c62828;
            }
        </style>
    </additionalCss>
</head>
<body>
    <content>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Quản lý khách hàng</h2>
            <button class="btn btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#createCustomerModal">
                <i class="fas fa-plus me-1"></i> Thêm khách hàng mới
            </button>

        </div>

        <!-- Filters and Search -->
        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/admin/customers}" method="get">
                    <div class="row g-3 align-items-center">

                        <!-- Search -->
                        <div class="col-md-3">
                            <input type="text" class="form-control" name="keyword"
                                   th:value="${keyword}" placeholder="Tìm kiếm khách hàng...">
                        </div>

                        <!-- Filter by Status -->
                        <div class="col-md-3">
                            <select class="form-select" name="status">
                                <option value="" th:selected="${status == null}">Tất cả trạng thái</option>
                                <option value="active" th:selected="${status == 'active'}">Hoạt động</option>
                                <option value="inactive" th:selected="${status == 'inactive'}">Không hoạt động</option>
                                <option value="banned" th:selected="${status == 'banned'}">Bị cấm</option>
                            </select>
                        </div>

                        <!-- Sort By -->
                        <div class="col-md-3">
                            <select class="form-select" name="sortBy">
                                <option value="">-- Sắp xếp theo --</option>
                                <option value="name" th:selected="${sortBy == 'name'}">Tên</option>
                                <option value="loyalty_points" th:selected="${sortBy == 'loyalty_points'}">Điểm tích lũy</option>
                                <option value="create_at" th:selected="${sortBy == 'create_at'}">Ngày tạo</option>
                            </select>
                        </div>

                        <!-- Sort Direction -->
                        <div class="col-md-2">
                            <select class="form-select" name="sortDir">
                                <option value="">-- Chiều sắp xếp --</option>
                                <option value="ASC" th:selected="${sortDir == 'ASC'}">Tăng dần</option>
                                <option value="DESC" th:selected="${sortDir == 'DESC'}">Giảm dần</option>
                            </select>
                        </div>

                        <!-- Submit -->
                        <div class="col-md-1 text-end">
                            <button type="submit" class="btn btn-outline-primary w-100">
                                <i class="fas fa-filter me-1"></i> Lọc
                            </button>
                        </div>

                    </div>
                </form>
            </div>
        </div>

        <!-- Customers Table -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th style="width: 50px;">#</th>
                                <th>Tên khách hàng</th>
                                <th>Số điện thoại</th>
                                <th>Email</th>
                                <th>Trạng thái</th>
                                <th>Điểm tích lũy</th>
                                <th style="width: 100px;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="customer, stat : ${customers}">
                                <td th:text="${stat.count + currentPage * 10}">1</td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="avatar me-3 bg-light rounded-circle text-center" style="width: 40px; height: 40px; line-height: 40px;">
                                            <i class="fas fa-user text-secondary"></i>
                                        </div>
                                        <div>
                                            <h6 class="mb-0" th:text="${customer.name}">Nguyễn Văn A</h6>
                                        </div>
                                    </div>
                                </td>
                                <td th:text="${customer.phoneNumber}">0912345678</td>
                                <td th:text="${customer.email}">nguyenvana@email.com</td>
                                <td>
                                    <span th:class="${
                                        customer.status == 'active' ? 'status-badge status-active' :
                                        customer.status == 'inactive' ? 'status-badge status-inactive' :
                                        customer.status == 'banned' ? 'status-badge status-banned' :
                                        'status-badge'
                                    }" th:text="${
                                        customer.status == 'active' ? 'Hoạt động' :
                                        customer.status == 'inactive' ? 'Không hoạt động' :
                                        customer.status == 'banned' ? 'Bị cấm' :
                                        customer.status
                                    }">Hoạt động</span>
                                </td>
                                <td th:text="${customer.loyaltyPoints}">120</td>
                                <td>
                                    <div class="btn-group">
                                        <a th:href="@{/admin/customers/{id}(id=${customer.customerId})}" class="btn btn-sm btn-outline-primary">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        <button type="button" class="btn btn-sm btn-outline-danger"
                                                th:onclick="'confirmDeleteCustomer(' + ${customer.customerId} + ')'">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>

                                    </div>
                                </td>
                            </tr>
                            <!-- If no customers, show a message -->
                            <tr th:if="${#lists.isEmpty(customers)}">
                                <td colspan="7" class="text-center py-4">
                                    <p class="mb-0 text-muted">Không tìm thấy khách hàng nào</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="card-footer d-flex justify-content-between align-items-center">
                <div>
                    <span>Hiển thị <span th:text="${#lists.size(customers)}">10</span> / <span th:text="${totalPages * 10}">100</span> khách hàng</span>
                </div>

                <nav th:if="${totalPages > 1}">
                    <ul class="pagination mb-0">

                        <!-- Previous -->
                        <li th:class="${currentPage == 0 ? 'page-item disabled' : 'page-item'}">
                            <a class="page-link" th:href="@{'/admin/customers?page=' + ${currentPage - 1} + ${queryParams}}" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>

                        <!-- Pages -->
                        <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:class="${i == currentPage ? 'page-item active' : 'page-item'}">
                            <a class="page-link" th:href="@{'/admin/customers?page=' + ${i} + ${queryParams}}" th:text="${i + 1}">1</a>
                        </li>

                        <!-- Next -->
                        <li th:class="${currentPage == totalPages - 1 ? 'page-item disabled' : 'page-item'}">
                            <a class="page-link" th:href="@{'/admin/customers?page=' + ${currentPage + 1} + ${queryParams}}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>

                    </ul>
                </nav>
            </div>
        </div>

        <!-- Modal thêm khách hàng mới -->
        <div class="modal fade" id="createCustomerModal" tabindex="-1" aria-labelledby="createCustomerModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <form th:action="@{/admin/customers/create}" method="post" class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="createCustomerModalLabel">Thêm khách hàng mới</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Họ tên</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" name="phoneNumber" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Địa chỉ</label>
                            <input type="text" name="street" class="form-control" placeholder="Số nhà, tên đường">
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <input type="text" name="ward" class="form-control" placeholder="Phường/Xã">
                            </div>
                            <div class="col-md-4 mb-3">
                                <input type="text" name="district" class="form-control" placeholder="Quận/Huyện">
                            </div>
                            <div class="col-md-4 mb-3">
                                <input type="text" name="city" class="form-control" placeholder="Tỉnh/Thành">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Trạng thái</label>
                            <select name="status" class="form-select">
                                <option value="active" selected>Hoạt động</option>
                                <option value="inactive">Không hoạt động</option>
                                <option value="banned">Bị cấm</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ghi chú</label>
                            <textarea name="note" class="form-control"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Huỷ</button>
                        <button type="submit" class="btn btn-primary">Tạo mới</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Form ẩn để submit xóa -->
        <form id="deleteForm" th:action="@{/admin/customers/delete}" method="post" style="display: none;">
            <input type="hidden" name="customerId" id="deleteCustomerId">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        </form>
    </content>

    <additionalJs>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const form = document.querySelector("form[method='get']");
                form.addEventListener("submit", function (e) {
                    // Xoá các field không có giá trị
                    form.querySelectorAll("input[name], select[name]").forEach(el => {
                        if (!el.value.trim()) {
                            el.removeAttribute("name");
                        }
                    });
                });
            });
        </script>
        <script>
            // Khi DOM đã sẵn sàng
            document.addEventListener("DOMContentLoaded", function () {
                // Xử lý form lọc để bỏ các trường rỗng trước khi submit
                const form = document.querySelector("form[method='get']");
                form.addEventListener("submit", function (e) {
                    form.querySelectorAll("input[name], select[name]").forEach(el => {
                        if (!el.value.trim()) {
                            el.removeAttribute("name");
                        }
                    });
                });
            });

            // Hàm xác nhận xóa và submit form ẩn
            function confirmDeleteCustomer(id) {
                Swal.fire({
                    title: 'Bạn có chắc?',
                    text: "Khách hàng sẽ bị xóa vĩnh viễn!",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    cancelButtonColor: '#aaa',
                    confirmButtonText: 'Xóa',
                    cancelButtonText: 'Huỷ'
                }).then((result) => {
                    if (result.isConfirmed) {
                        // Gán ID vào input ẩn
                        document.getElementById("deleteCustomerId").value = id;
                        // Gửi form
                        document.getElementById("deleteForm").submit();
                    }
                });
            }
        </script>
        <!-- Thông báo -->
        <script th:inline="javascript">
            /*<![CDATA[*/
                let successMessage = /*[[${success}]]*/ null;
                let errorMessage = /*[[${error}]]*/ null;

                if (successMessage) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Thành công!',
                        text: successMessage,
                        confirmButtonColor: '#3085d6'
                    });
                }

                if (errorMessage) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Thất bại!',
                        text: errorMessage,
                        confirmButtonColor: '#d33'
                    });
                }
            /*]]>*/
        </script>

    </additionalJs>
</body>
</html>
